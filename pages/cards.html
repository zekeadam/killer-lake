<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../src/css/style.css">
    <style>
        /* Alapértelmezett body stílusok felülírása a görgethető tartalomhoz */
        html, body {
            margin: 0;
            padding: 20px; /* Hozzáadott padding, hogy ne tapadjon a széléhez */
            height: auto; /* Engedélyezi a tartalom magasságának növekedését */
            overflow: auto; /* Engedélyezi a görgetést */
            background-color: #0d0d1a; 
            background-image: url('../assets/bg.png'); 
            background-size: cover;          
            background-position: center;     
            background-repeat: no-repeat;    
            color: #eaeaea; 
            font-family: 'Outfit', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: block; /* Felülírja a flex display-t */
            align-items: unset; /* Felülírja az align-items-t */
            justify-content: unset; /* Felülírja a justify-content-t */
        }

        .card-grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); /* Reszponzív rács, 25%-kal nagyobb */
            gap: 25px;
            max-width: 1600px; /* Maximális szélesség a jobb olvashatóságért */
            margin: 0 auto;
            padding: 30px;
            background: rgba(10, 10, 20, 0.6);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(0,0,0,0.7);
        }

        .grid-card {
            background: radial-gradient(circle at top left, rgba(60, 60, 80, 0.3), transparent),
                        rgba(10, 10, 20, 0.4);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid rgba(197, 160, 89, 0.6);
            border-left: 2px solid rgba(197, 160, 89, 0.4);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.2s ease, box-shadow 0.2s;
        }
        .grid-card:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 45px rgba(197, 160, 89, 0.4);
        }
        .grid-card img {
            width: 100%;
            aspect-ratio: 2 / 3;
            height: auto;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid rgba(197, 160, 89, 0.3);
        }
        .card-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
            padding: 0 5px;
        }
        .grid-card h3 {
            margin: 0;
            color: #fff; /* Fehér név */
            font-size: 1.25rem; /* Kicsit nagyobb név */
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            max-width: 65%;
            display: flex;
            align-items: center;
        }
        .hp-label-mini {
            font-size: 0.95rem;
            font-weight: bold;
            color: #fff; /* Fehér HP szöveg */
            background: rgba(46, 204, 113, 0.3); /* Erősebb zöld háttér a fehér szöveghez */
            padding: 2px 8px;
            border-radius: 8px;
            white-space: nowrap;
        }
        .grid-card .attacks-list {
            text-align: left;
            width: 100%;
            margin-top: 5px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .grid-card .attacks-list ul {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            list-style: none;
            padding: 0;
            margin: 0;
            width: 100%;
        }
        .grid-card .attacks-list li {
            background: linear-gradient(180deg, #1a2a4a 0%, #0f172a 100%);
            border: 1px solid #2a4a7a;
            border-radius: 8px;
            padding: 6px 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 72px;
            box-sizing: border-box;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            text-transform: uppercase;
            border-bottom: 2px solid rgba(0,0,0,0.3);
        }
        .li-title {
            font-size: 0.78rem;
            color: #fff;
            font-weight: 800;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            width: 100%;
        }
        .li-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 0.68rem;
            color: #4cc9f0;
            font-weight: 700;
            margin-bottom: 0;
        }
        .li-row span {
            flex: 1;
            text-align: left;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .li-row span:last-child {
            text-align: right;
        }
        .li-eff {
            color: #f1c40f !important;
            font-style: italic;
        }
        /* Sorszám stílusa */
        .card-index {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(13, 13, 26, 0.85);
            color: #f1c40f;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 5;
            border: 1px solid rgba(197, 160, 89, 0.5);
        }
        
        /* Buff és Nerf stílusok az optimalizált statokhoz */
        .stat-buff { color: #2ecc71; font-weight: 900; }
        .stat-nerf { color: #ff4d4d; font-weight: 900; }
        .stat-old { color: #888; text-decoration: line-through; margin-right: 5px; font-weight: normal; }
        
        #back-to-game-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            background: linear-gradient(135deg, #e94560 0%, #b22d42 100%);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            transition: all 0.2s ease;
            text-transform: uppercase;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
        }
        #back-to-game-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
            box-shadow: 0 8px 20px rgba(233, 69, 96, 0.4);
        }
        
        #guide-nav-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 12px 20px;
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            transition: all 0.2s ease;
            text-transform: uppercase;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
        }
        #guide-nav-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.4);
        }
    </style>
</head>
<body>
    <button id="guide-nav-btn" onclick="window.location.href='guide.html'">📖 Játékszabályok</button>
    <button id="back-to-game-btn" onclick="window.location.href='../index.html'">🎮 Vissza a játékba</button>
    <div id="card-grid" class="card-grid-container">
        <!-- A kártyák ide kerülnek beillesztésre JavaScript segítségével -->
    </div>

    <script src="../src/js/cards.js"></script>
    <script>
        // Ugyanaz a logika, mint a fő játékban: csak overflow esetén mutass súgót
        function setTooltipIfOverflows(container, textElement, fullText) {
            container.classList.remove('has-tooltip');
            requestAnimationFrame(() => {
                if (textElement.scrollWidth > textElement.clientWidth) {
                    container.classList.add('has-tooltip');
                    container.setAttribute('data-tooltip', fullText);
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Próbáljuk meg betölteni az optimalizált statisztikákat
            const optScript = document.createElement('script');
            optScript.src = 'optimized_cards.js';
            optScript.onload = () => {
                if (typeof optimizedCardOverrides !== 'undefined') {
                    cardDatabase.forEach(card => {
                        const override = optimizedCardOverrides[card.id];
                        if (override) {
                            if (override.maxHp !== undefined && override.maxHp !== card.maxHp) {
                                card.origMaxHp = card.maxHp;
                                card.maxHp = override.maxHp;
                            }
                            if (override.attacks) {
                                card.attacks.forEach((atk, i) => {
                                    if (override.attacks[i]) {
                                        if (override.attacks[i].dmg !== undefined && override.attacks[i].dmg !== atk.dmg) atk.origDmg = atk.dmg;
                                        if (override.attacks[i].accuracy !== undefined && override.attacks[i].accuracy !== atk.accuracy) atk.origAccuracy = atk.accuracy;
                                        if (override.attacks[i].healAmount !== undefined && override.attacks[i].healAmount !== atk.healAmount) atk.origHealAmount = atk.healAmount;
                                        if (override.attacks[i].hits !== undefined && override.attacks[i].hits !== (atk.hits || 1)) atk.origHits = (atk.hits || 1);
                                        if (override.attacks[i].cost !== undefined && override.attacks[i].cost !== atk.cost) atk.origCost = atk.cost;
                                        Object.assign(atk, override.attacks[i]);
                                    }
                                });
                            }
                        }
                    });
                }
                renderGrid();
            };
            optScript.onerror = () => renderGrid(); // Ha nincs fájl, akkor is rajzoljon
            document.head.appendChild(optScript);

            function renderGrid() {
            const cardGrid = document.getElementById('card-grid');
                cardGrid.innerHTML = ''; // Törlés frissítés esetén

            cardDatabase.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'grid-card';
                cardEl.style.position = 'relative';

                let attacksHtml = '';
                if (card.type === 'item' || card.type === 'supporter') {
                    attacksHtml = `<div class="attacks-list" style="padding: 10px; color: #f1c40f; text-align: center; font-size: 0.9rem;">${card.description || 'Különleges lap'}</div>`;
                } else if (card.attacks && card.attacks.length > 0) {
                    attacksHtml = '<div class="attacks-list"><ul>';
                    card.attacks.forEach(attack => {
                        let icon = "⚔️";
                        if (attack.type === 'heal') icon = "🧪";
                        if (attack.type === 'shield') icon = "🛡️";
                        
                        let statText = "---";
                        let hitText = "---";
                        let effectLabel = attack.effect ? attack.effect.toUpperCase() : "";

                        if (attack.type === 'dmg') {
                            const acc = Math.round((attack.accuracy !== undefined ? attack.accuracy : 1.0) * 100);
                            
                            let dmgDisplay = `${attack.dmg}`;
                            if (attack.origDmg !== undefined) {
                                dmgDisplay = `<span class="stat-old">${attack.origDmg}</span><span class="${attack.dmg > attack.origDmg ? 'stat-buff' : 'stat-nerf'}">${attack.dmg}</span>`;
                            }
                            
                            let accDisplay = `${acc}%`;
                            if (attack.origAccuracy !== undefined) {
                                const origAcc = Math.round(attack.origAccuracy * 100);
                                accDisplay = `<span class="stat-old">${origAcc}%</span><span class="${acc > origAcc ? 'stat-buff' : 'stat-nerf'}">${acc}%</span>`;
                            }
                            
                            let hitsDisplay = `${attack.hits || 1}x`;
                            if (attack.origHits !== undefined) {
                                hitsDisplay = `<span class="stat-old">${attack.origHits}x</span><span class="${attack.hits > attack.origHits ? 'stat-buff' : 'stat-nerf'}">${attack.hits}x</span>`;
                            }

                            statText = `💥${dmgDisplay}`;
                            hitText = `🎯${hitsDisplay} | 🎲${accDisplay}`;
                            if (attack.effect === 'burn') icon = "🔥";
                            if (attack.effect === 'paralyze') icon = "⚡";
                        } else if (attack.type === 'heal') {
                            let healDisplay = `${attack.healAmount}`;
                            if (attack.origHealAmount !== undefined) {
                                healDisplay = `<span class="stat-old">${attack.origHealAmount}</span><span class="${attack.healAmount > attack.origHealAmount ? 'stat-buff' : 'stat-nerf'}">${attack.healAmount}</span>`;
                            }
                            statText = `💚+${healDisplay}`;
                            hitText = "REGEN";
                        } else if (attack.type === 'shield') {
                            statText = "🛡️VÉD";
                            hitText = "PAJZS";
                        }

                        let costDisplay = `${attack.cost}`;
                        if (attack.origCost !== undefined) {
                            costDisplay = `<span class="stat-old">${attack.origCost}</span><span class="${attack.cost < attack.origCost ? 'stat-buff' : 'stat-nerf'}">${attack.cost}</span>`;
                        }

                        attacksHtml += `
                            <li class="tooltip-bottom">
                                <div class="li-title"><span class="truncate-text">${icon} ${attack.name}</span></div>
                                <div class="li-row"><span>${statText}</span><span>${hitText}</span></div>
                                <div class="li-row"><span>⚡${costDisplay} AP</span><span class="li-eff">${effectLabel}</span></div>
                            </li>`;
                    });
                    attacksHtml += '</ul></div>';
                }

                let hpDisplay = `${card.maxHp}`;
                if (card.origMaxHp !== undefined) {
                    hpDisplay = `<span class="stat-old">${card.origMaxHp}</span><span class="${card.maxHp > card.origMaxHp ? 'stat-buff' : 'stat-nerf'}">${card.maxHp}</span>`;
                }

                cardEl.innerHTML = `
                    <div class="card-index">#${index}</div>
                    <img src="../${card.image}" alt="${card.name}">
                    <div class="card-header-row">
                        <h3 class="tooltip-bottom"><span class="truncate-text">${card.name}</span></h3>
                        ${card.type === 'item' || card.type === 'supporter' ? `<span class="hp-label-mini" style="background: rgba(155, 89, 182, 0.5);">${card.type.toUpperCase()}</span>` : `<span class="hp-label-mini">❤️ ${hpDisplay} HP</span>`}
                    </div>
                    ${attacksHtml}
                `;
                cardGrid.appendChild(cardEl);

                // Tooltip-ek beállítása az új kártyán belül
                const h3 = cardEl.querySelector('h3');
                setTooltipIfOverflows(h3, h3.querySelector('.truncate-text'), card.name);

                cardEl.querySelectorAll('.attacks-list li').forEach((li, idx) => {
                    const attack = card.attacks[idx];
                    if (attack) setTooltipIfOverflows(li, li.querySelector('.truncate-text'), attack.name);
                });
                });
            }
        });
    </script>
</body>
</html>
