<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Killer Lake - Kártya Teszt Oldal</title>
    <style>
        body { background: #0d0d1a; color: #eaeaea; font-family: 'Segoe UI', sans-serif; padding: 40px; }
        h1 { color: #e94560; text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        th, td { border: 1px solid rgba(255,255,255,0.1); padding: 15px; text-align: left; }
        th { background: #0f3460; color: #f1c40f; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
        tr:hover { background: rgba(233, 69, 96, 0.1); }
        .card-img { width: 90px; height: auto; border-radius: 6px; border: 1px solid #16213e; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
        .attack-tag { display: inline-block; padding: 5px 10px; background: #1a2a4a; border-radius: 6px; font-size: 0.8rem; margin: 3px; border: 1px solid #2a4a7a; color: #4cc9f0; }
        .attack-tag b { color: #fff; }
        .hp-val { font-weight: 900; color: #2ecc71; font-size: 1.2rem; text-shadow: 0 0 10px rgba(46, 204, 113, 0.3); }
        .effect-text { color: #f1c40f; font-weight: bold; font-size: 0.7rem; }
    </style>
</head>
<body>
    <h1>Killer Lake - Kártya Adatbázis Áttekintés</h1>
    <p class="subtitle">A kártyák listája a stats 1.md és a cards.js alapján</p>
    <table id="cardTable">
        <thead>
            <tr>
                <th>Portré</th>
                <th>Név / Azonosító</th>
                <th>HP</th>
                <th>Támadások és Képességek</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="cards.js"></script>
    <script>
        const tbody = document.querySelector('#cardTable tbody');
        cardDatabase.forEach(card => {
            const tr = document.createElement('tr');
            
            let attacksHtml = card.attacks.map(a => {
                const typeInfo = a.type === 'dmg' ? `💥 ${a.dmg}${a.hits ? 'x'+a.hits : ''} DMG` : 
                                 a.type === 'heal' ? `💚 +${a.healAmount} HP` : '🛡️ PAJZS';
                const effect = a.effect ? `<span class="effect-text"> [${a.effect.toUpperCase()}]</span>` : '';
                return `<div class="attack-tag"><b>${a.name}</b> (${a.cost} AP) <br> ${typeInfo}${effect}</div>`;
            }).join('');

            tr.innerHTML = `
                <td><img src="${card.image}" class="card-img" alt="${card.name}"></td>
                <td><strong style="font-size: 1.1rem; color: #fff;">${card.name}</strong><br><small style="color: #666;">ID: ${card.id}</small></td>
                <td class="hp-val">${card.maxHp}</td>
                <td>${attacksHtml}</td>
            `;
            tbody.appendChild(tr);
        });
    </script>
</body>
</html>
