<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Killer Lake - Kártya Adatbázis</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Alapértelmezett body stílusok felülírása a görgethető tartalomhoz */
        html, body {
            margin: 0;
            padding: 20px; /* Hozzáadott padding, hogy ne tapadjon a széléhez */
            height: auto; /* Engedélyezi a tartalom magasságának növekedését */
            overflow: auto; /* Engedélyezi a görgetést */
            background-color: #0d0d1a; 
            background-image: url('bg.png'); 
            background-size: cover;          
            background-position: center;     
            background-repeat: no-repeat;    
            color: #eaeaea; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: block; /* Felülírja a flex display-t */
            align-items: unset; /* Felülírja az align-items-t */
            justify-content: unset; /* Felülírja a justify-content-t */
        }

        .card-grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); /* Reszponzív rács, 25%-kal nagyobb */
            gap: 25px;
            max-width: 1600px; /* Maximális szélesség a jobb olvashatóságért */
            margin: 0 auto;
            padding: 30px;
            background: rgba(10, 10, 20, 0.6);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(0,0,0,0.7);
        }

        .grid-card {
            background: radial-gradient(circle at top left, rgba(60, 60, 80, 0.3), transparent),
                        rgba(10, 10, 20, 0.4);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid rgba(197, 160, 89, 0.6);
            border-left: 2px solid rgba(197, 160, 89, 0.4);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.2s ease, box-shadow 0.2s;
        }
        .grid-card:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 45px rgba(197, 160, 89, 0.4);
        }
        .grid-card img {
            width: 100%;
            height: 475px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid rgba(197, 160, 89, 0.3);
        }
        .card-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
            padding: 0 5px;
        }
        .grid-card h3 {
            margin: 0;
            color: #fff; /* Fehér név */
            font-size: 1.25rem; /* Kicsit nagyobb név */
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            max-width: 65%;
            display: flex;
            align-items: center;
        }
        .hp-label-mini {
            font-size: 0.95rem;
            font-weight: bold;
            color: #fff; /* Fehér HP szöveg */
            background: rgba(46, 204, 113, 0.3); /* Erősebb zöld háttér a fehér szöveghez */
            padding: 2px 8px;
            border-radius: 8px;
            white-space: nowrap;
        }
        .grid-card .attacks-list {
            text-align: left;
            width: 100%;
            margin-top: 5px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .grid-card .attacks-list ul {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .grid-card .attacks-list li {
            background: linear-gradient(180deg, #1a2a4a 0%, #0f172a 100%);
            border: 1px solid #2a4a7a;
            border-radius: 8px;
            padding: 5px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Elemek egymás után, üres hely nélkül */
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            text-transform: uppercase;
            border-bottom: 2px solid rgba(0,0,0,0.3);
        }
        .li-title {
            font-size: 0.8rem; /* Nagyobb cím */
            color: #fff;
            font-weight: 800;
            margin-bottom: 2px; /* Csak egy minimális távolság a következő sortól */
            display: flex;
            align-items: center;
        }
        .li-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 0.7rem; /* Nagyobb stat szöveg */
            color: #4cc9f0;
            font-weight: 700;
        }
        .li-row span {
            flex: 1;
            text-align: left;
        }
        .li-row span:last-child {
            text-align: right;
        }
        .li-eff {
            color: #f1c40f !important;
            font-style: italic;
        }
        /* Sorszám stílusa */
        .card-index {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(13, 13, 26, 0.85);
            color: #f1c40f;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 5;
            border: 1px solid rgba(197, 160, 89, 0.5);
        }
    </style>
</head>
<body>
    <div id="card-grid" class="card-grid-container">
        <!-- A kártyák ide kerülnek beillesztésre JavaScript segítségével -->
    </div>

    <script src="cards.js"></script>
    <script>
        // Ugyanaz a logika, mint a fő játékban: csak overflow esetén mutass súgót
        function setTooltipIfOverflows(container, textElement, fullText) {
            container.classList.remove('has-tooltip');
            requestAnimationFrame(() => {
                if (textElement.scrollWidth > textElement.clientWidth) {
                    container.classList.add('has-tooltip');
                    container.setAttribute('data-tooltip', fullText);
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const cardGrid = document.getElementById('card-grid');

            cardDatabase.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'grid-card';
                cardEl.style.position = 'relative';

                let attacksHtml = '';
                if (card.type === 'item' || card.type === 'supporter') {
                    attacksHtml = `<div class="attacks-list" style="padding: 10px; color: #f1c40f; text-align: center; font-size: 0.9rem;">${card.description || 'Különleges lap'}</div>`;
                } else if (card.attacks && card.attacks.length > 0) {
                    attacksHtml = '<div class="attacks-list"><ul>';
                    card.attacks.forEach(attack => {
                        let icon = "⚔️";
                        if (attack.type === 'heal') icon = "🧪";
                        if (attack.type === 'shield') icon = "🛡️";
                        
                        let statText = "---";
                        let hitText = "---";
                        let effectLabel = attack.effect ? attack.effect.toUpperCase() : "";

                        if (attack.type === 'dmg') {
                            const acc = Math.round((attack.accuracy !== undefined ? attack.accuracy : 1.0) * 100);
                            statText = `💥${attack.dmg}`;
                            hitText = `🎯${attack.hits || 1}x | 🎲${acc}%`;
                            if (attack.effect === 'burn') icon = "🔥";
                            if (attack.effect === 'paralyze') icon = "⚡";
                        } else if (attack.type === 'heal') {
                            statText = `💚+${attack.healAmount}`;
                            hitText = "REGEN";
                        } else if (attack.type === 'shield') {
                            statText = "🛡️VÉD";
                            hitText = "PAJZS";
                        }

                        attacksHtml += `
                            <li class="tooltip-bottom">
                                <div class="li-title"><span class="truncate-text">${icon} ${attack.name}</span></div>
                                <div class="li-row"><span>${statText}</span><span>${hitText}</span></div>
                                <div class="li-row"><span>⚡${attack.cost} AP</span><span class="li-eff">${effectLabel}</span></div>
                            </li>`;
                    });
                    attacksHtml += '</ul></div>';
                }

                cardEl.innerHTML = `
                    <div class="card-index">#${index}</div>
                    <img src="${card.image}" alt="${card.name}">
                    <div class="card-header-row">
                        <h3 class="tooltip-bottom"><span class="truncate-text">${card.name}</span></h3>
                        ${card.type === 'item' || card.type === 'supporter' ? `<span class="hp-label-mini" style="background: rgba(155, 89, 182, 0.5);">${card.type.toUpperCase()}</span>` : `<span class="hp-label-mini">❤️ ${card.maxHp} HP</span>`}
                    </div>
                    ${attacksHtml}
                `;
                cardGrid.appendChild(cardEl);

                // Tooltip-ek beállítása az új kártyán belül
                const h3 = cardEl.querySelector('h3');
                setTooltipIfOverflows(h3, h3.querySelector('.truncate-text'), card.name);

                cardEl.querySelectorAll('.attacks-list li').forEach((li, idx) => {
                    const attack = card.attacks[idx];
                    if (attack) setTooltipIfOverflows(li, li.querySelector('.truncate-text'), attack.name);
                });
            });
        });
    </script>
</body>
</html>
